version: '3.8'

services:
  backend:
    build: ./backend
    container_name: crm-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-changeme-in-production}
      - FRONTEND_URL=http://localhost:5173
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: crm-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
